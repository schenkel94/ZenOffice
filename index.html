<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ZenOffice</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<script src="https://cdn.tailwindcss.com"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>

body{
-webkit-tap-highlight-color: transparent;
user-select:none;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#4f46e5;border-radius:10px}

.animate-fadeIn{
animation:fadeIn .4s ease-out forwards
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.safe-bottom{
padding-bottom:160px
}

/* feedback visual drag */

.dragging{
opacity:.5;
transform:scale(.98);
border:1px dashed #6366f1
}

</style>

</head>

<body class="bg-slate-900 text-white overflow-hidden">

<div id="root"></div>

<script type="text/babel">

const {useState,useEffect,useRef,useContext,createContext}=React;

/* FRASES */

const MOTIVATIONAL_QUOTES=[
"O sucesso é a soma de pequenos esforços.",
"Respire fundo. Você consegue.",
"Foco no progresso.",
"Um passo de cada vez.",
"Descanse mas não desista.",
"Hoje é um ótimo dia para começar."
];

/* ICONES */

const Icons={

Play:(p)=>(<svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
<polygon points="5 3 19 12 5 21 5 3"/>
</svg>),

Pause:(p)=>(<svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24"
viewBox="0 0 24 24" fill="none" stroke="currentColor"
strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
<rect x="6" y="4" width="4" height="16"/>
<rect x="14" y="4" width="4" height="16"/>
</svg>),

Check:(p)=>(<svg {...p} xmlns="http://www.w3.org/2000/svg"
width="24" height="24" viewBox="0 0 24 24"
fill="none" stroke="currentColor" strokeWidth="2"
strokeLinecap="round" strokeLinejoin="round">
<polyline points="20 6 9 17 4 12"/>
</svg>),

Trash:(p)=>(<svg {...p} xmlns="http://www.w3.org/2000/svg"
width="24" height="24" viewBox="0 0 24 24"
fill="none" stroke="currentColor" strokeWidth="2"
strokeLinecap="round" strokeLinejoin="round">
<path d="M3 6h18"/>
<path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
</svg>),

Bell:(p)=>(<svg {...p} xmlns="http://www.w3.org/2000/svg"
width="24" height="24" viewBox="0 0 24 24"
fill="none" stroke="currentColor"
strokeWidth="2" strokeLinecap="round"
strokeLinejoin="round">
<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
</svg>)
};

/* CONTEXTO SOM */

const SoundContext=createContext();

const SoundProvider=({children})=>{

const audioRef=useRef(null);
const [playing,setPlaying]=useState(null);

const toggleSound=(file)=>{

if(playing===file){

audioRef.current.pause();
audioRef.current.currentTime=0;
setPlaying(null);
return;

}

if(audioRef.current){
audioRef.current.pause()
}

audioRef.current=new Audio(file)
audioRef.current.loop=true
audioRef.current.play()

setPlaying(file)

}

const stopAudio=()=>{

if(audioRef.current){
audioRef.current.pause()
audioRef.current.currentTime=0
}

setPlaying(null)

}

return(

<SoundContext.Provider value={{playing,toggleSound,stopAudio}}>
{children}
</SoundContext.Provider>

)

};

/* CONTEXTO USER */

const UserContext=createContext();

const UserProvider=({children})=>{

const [xp,setXp]=useState(()=>parseInt(localStorage.getItem("zenXP")||"0"))
const [history,setHistory]=useState(()=>JSON.parse(localStorage.getItem("zenHistory")||"{}"))

useEffect(()=>localStorage.setItem("zenXP",xp),[xp])
useEffect(()=>localStorage.setItem("zenHistory",JSON.stringify(history)),[history])

const level=Math.floor(xp/500)+1

const addFocusTime=(minutes)=>{

const gained=minutes*4
setXp(p=>p+gained)

const today=new Date().toISOString().split("T")[0]

setHistory(prev=>({
...prev,
[today]:(prev[today]||0)+minutes
}))

return gained

}

return(

<UserContext.Provider value={{xp,level,history,addFocusTime}}>
{children}
</UserContext.Provider>

)

};
/* =========================
FOCUS MODE (POMODORO)
========================= */

const FocusMode = () => {

const { addFocusTime } = useContext(UserContext);
const { stopAudio } = useContext(SoundContext);

const [mode,setMode] = useState("work")
const [isActive,setIsActive] = useState(false)
const [timeLeft,setTimeLeft] = useState(25*60)

const alarmRef = useRef(null)

useEffect(()=>{

let interval = null

if(isActive && timeLeft>0){

interval = setInterval(()=>{
setTimeLeft(t=>t-1)
},1000)

}

if(timeLeft===0 && isActive){

setIsActive(false)

if(!alarmRef.current){
alarmRef.current = new Audio("alarme.mp3")
}

alarmRef.current.currentTime=0
alarmRef.current.play().catch(()=>{})

if(mode==="work"){

const earned = addFocusTime(25)

alert(`Ciclo concluído! +${earned} XP`)

if("Notification" in window && Notification.permission==="granted"){

new Notification("ZenOffice",{
body:"Ciclo de foco finalizado!",
icon:"icon.png"
})

}

}

stopAudio()

}

return ()=>clearInterval(interval)

},[isActive,timeLeft])

/* -------- RESET -------- */

const resetTimer = ()=>{

setIsActive(false)

if(mode==="work") setTimeLeft(25*60)
if(mode==="short") setTimeLeft(5*60)
if(mode==="long") setTimeLeft(15*60)

if(alarmRef.current){
alarmRef.current.pause()
alarmRef.current.currentTime=0
}

}

/* -------- PLAY / PAUSE -------- */

const toggleTimer = ()=>{

if(isActive){

if(alarmRef.current){
alarmRef.current.pause()
alarmRef.current.currentTime=0
}

setIsActive(false)

}else{

setIsActive(true)

}

}

/* -------- FORMATA TEMPO -------- */

const formatTime = (s)=>{

const m = Math.floor(s/60)
const sec = s%60

return `${m}:${sec.toString().padStart(2,"0")}`

}

/* -------- UI -------- */

return(

<div className="flex flex-col items-center mt-8 space-y-8 safe-bottom animate-fadeIn">

<h2 className="text-3xl font-bold">Modo Foco</h2>

<div className="w-72 h-72 rounded-full border-4 border-indigo-500 flex items-center justify-center shadow-xl">

<span className="text-7xl font-mono font-bold">
{formatTime(timeLeft)}
</span>

</div>

<div className="flex gap-6">

<button
onClick={resetTimer}
className="bg-gray-800 p-4 rounded-full hover:bg-gray-700"

>

Reset

</button>

<button
onClick={toggleTimer}
className="bg-indigo-600 p-6 rounded-full hover:bg-indigo-500 text-xl"

>

{isActive ? "Pause" : "Start"}

</button>

</div>

<div className="flex gap-3 bg-gray-800 p-2 rounded-xl">

<button
onClick={()=>{

setMode("work")
setIsActive(false)
setTimeLeft(25*60)

}}
className={`px-4 py-2 rounded ${mode==="work"?"bg-indigo-600":""}`}

>

Foco

</button>

<button
onClick={()=>{

setMode("short")
setIsActive(false)
setTimeLeft(5*60)

}}
className={`px-4 py-2 rounded ${mode==="short"?"bg-indigo-600":""}`}

>

Pausa Curta

</button>

<button
onClick={()=>{

setMode("long")
setIsActive(false)
setTimeLeft(15*60)

}}
className={`px-4 py-2 rounded ${mode==="long"?"bg-indigo-600":""}`}

>

Pausa Longa

</button>

</div>

</div>

)

}
/* =========================
TASKS MODE
========================= */

const TasksMode = () => {

const [tasks,setTasks] = useState([])
const [title,setTitle] = useState("")
const [time,setTime] = useState("")
const [snooze,setSnooze] = useState(10)

const dragIndex = useRef(null)
const alarmRef = useRef(null)

/* -------- CARREGAR LOCALSTORAGE -------- */

useEffect(()=>{

const saved = localStorage.getItem("zen_tasks")

if(saved){

setTasks(JSON.parse(saved))

}

},[])

/* -------- SALVAR LOCALSTORAGE -------- */

useEffect(()=>{

localStorage.setItem("zen_tasks",JSON.stringify(tasks))

},[tasks])


/* ---------- ADD TASK ---------- */

const addTask = ()=>{

if(!title || !time) return

const newTask = {
id:Date.now(),
title,
time,
snooze,
done:false
}

setTasks([...tasks,newTask])
setTitle("")
setTime("")

}

/* ---------- COMPLETE TASK ---------- */

const completeTask = (id)=>{

setTasks(tasks.map(t=>t.id===id ? {...t,done:true} : t))

}

/* ---------- SNOOZE TASK ---------- */

const snoozeTask = (task)=>{

const now = new Date()

const snoozeTime = new Date(now.getTime() + task.snooze*60000)

const hh = snoozeTime.getHours().toString().padStart(2,"0")
const mm = snoozeTime.getMinutes().toString().padStart(2,"0")

const newTime = `${hh}:${mm}`

setTasks(tasks.map(t=>t.id===task.id ? {...t,time:newTime} : t))

}

/* ---------- QUICK SNOOZE ---------- */

const quickSnooze = (task,minutes)=>{

const now = new Date()

const snoozeTime = new Date(now.getTime() + minutes*60000)

const hh = snoozeTime.getHours().toString().padStart(2,"0")
const mm = snoozeTime.getMinutes().toString().padStart(2,"0")

const newTime = `${hh}:${mm}`

setTasks(tasks.map(t=>t.id===task.id ? {...t,time:newTime} : t))

}

/* ---------- DRAG ---------- */

const onDragStart = (index)=>{

dragIndex.current=index

}

const onDrop = (index)=>{

const newTasks=[...tasks]

const dragged=newTasks[dragIndex.current]

newTasks.splice(dragIndex.current,1)

newTasks.splice(index,0,dragged)

setTasks(newTasks)

}

/* ---------- CHECK TIME ---------- */

useEffect(()=>{

const interval=setInterval(()=>{

const now = new Date()

const hh = now.getHours().toString().padStart(2,"0")
const mm = now.getMinutes().toString().padStart(2,"0")

const current=`${hh}:${mm}`

tasks.forEach(task=>{

if(!task.done && task.time===current){

/* tocar som */

if(!alarmRef.current){

alarmRef.current = new Audio("notify.mp3")

}

alarmRef.current.currentTime = 0
alarmRef.current.play().catch(()=>{})

/* notificação */

if("Notification" in window && Notification.permission==="granted"){

new Notification("Tarefa agendada",{
body: task.title,
icon:"icon.png"
})

}

const action = window.confirm(`Tarefa: ${task.title}

OK = finalizar
Cancelar = adiar`)

if(action){

completeTask(task.id)

}else{

snoozeTask(task)

}

}


})

},30000)

return ()=>clearInterval(interval)

},[tasks])

/* ---------- UI ---------- */

return(

<div className="p-6 space-y-6">

<h2 className="text-2xl font-bold">Agendador</h2>

<div className="flex gap-2 flex-wrap">

<input
value={title}
onChange={e=>setTitle(e.target.value)}
placeholder="Tarefa"
className="bg-gray-800 p-2 rounded"
/>

<input
type="time"
value={time}
onChange={e=>setTime(e.target.value)}
className="bg-gray-800 p-2 rounded"
/>

<input
type="number"
value={snooze}
onChange={e=>setSnooze(e.target.value)}
className="bg-gray-800 p-2 rounded w-24"
placeholder="Snooze"
/>

<button
onClick={addTask}
className="bg-indigo-600 px-4 py-2 rounded"

>

Adicionar

</button>

</div>

<div className="space-y-3">

{tasks.map((task,index)=>(

<div
key={task.id}
draggable
onDragStart={()=>onDragStart(index)}
onDragOver={(e)=>e.preventDefault()}
onDrop={()=>onDrop(index)}
className="bg-gray-800 p-3 rounded flex justify-between items-center"
>

<div>

<div className={task.done?"line-through":""}>
{task.title}
</div>

<div className="text-sm text-gray-400">
{task.time}
</div>

</div>

<div className="flex gap-2">

<button
onClick={()=>completeTask(task.id)}
className="bg-green-600 px-2 rounded"

>

✓

</button>

<button
onClick={()=>snoozeTask(task)}
className="bg-yellow-600 px-2 rounded"

>

Adiar

</button>

<button
onClick={()=>quickSnooze(task,5)}
className="bg-gray-600 px-2 rounded"

>

+5

</button>

<button
onClick={()=>quickSnooze(task,10)}
className="bg-gray-600 px-2 rounded"

>

+10

</button>

<button
onClick={()=>quickSnooze(task,30)}
className="bg-gray-600 px-2 rounded"

>

+30

</button>

</div>

</div>

))}

</div>

</div>

)

}
/* =========================
APP PRINCIPAL
========================= */

const App = () => {

const [mode,setMode] = useState("focus")

/* -------- PEDIR PERMISSÃO DE NOTIFICAÇÃO -------- */

useEffect(()=>{

if("Notification" in window){

if(Notification.permission!=="granted" && Notification.permission!=="denied"){

Notification.requestPermission()

}

}

},[])

/* -------- UI -------- */

return(

<div className="min-h-screen bg-gray-900 text-white flex flex-col items-center">

<header className="w-full bg-gray-800 p-4 flex justify-center gap-4 shadow">

<button
onClick={()=>setMode("focus")}
className={`px-4 py-2 rounded ${mode==="focus"?"bg-indigo-600":"bg-gray-700"}`}

>

Focus

</button>

<button
onClick={()=>setMode("tasks")}
className={`px-4 py-2 rounded ${mode==="tasks"?"bg-indigo-600":"bg-gray-700"}`}

>

Tarefas

</button>

</header>

<main className="w-full max-w-3xl p-4">

{mode==="focus" && <FocusMode/>}

{mode==="tasks" && <TasksMode/>}

</main>

<footer className="mt-auto p-4 text-sm text-gray-400">

ZenOffice • Produtividade e foco

</footer>

</div>

)

}

/* =========================
RENDER APP
========================= */

ReactDOM.createRoot(document.getElementById("root")).render(

<UserProvider>

<SoundProvider>

<App/>

</SoundProvider>

</UserProvider>

)
